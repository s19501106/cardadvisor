<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0c12;--bg2:#141418;--bg3:#1c1c22;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f0;--text2:rgba(255,255,255,0.5);--text3:rgba(255,255,255,0.28);
  --blue:#5B8EFF;--blue-bg:rgba(91,142,255,0.15);--blue-border:rgba(91,142,255,0.45);
  --green:#2BCC88;--green-bg:rgba(43,204,136,0.13);--green-border:rgba(43,204,136,0.4);
  --amber:#F5C242;--amber-bg:rgba(245,194,66,0.12);--amber-border:rgba(245,194,66,0.35);
  --red:#F06060;--red-bg:rgba(240,96,96,0.12);--red-border:rgba(240,96,96,0.35);
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-full:999px;
}
html,body{background:var(--bg);font-family:'Noto Sans TC',system-ui,sans-serif;color:var(--text);min-height:100%;-webkit-font-smoothing:antialiased;}

/* ── Header ── */
.hdr{padding:18px 16px 14px;border-bottom:1px solid var(--border);}
.hdr-row{display:flex;align-items:center;gap:9px;}
.app-icon{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#3B6EE8,#7B3FD4);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.app-icon svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.app-title{font-size:16px;font-weight:800;letter-spacing:.2px;}
.version-tag{font-size:9px;padding:2px 6px;border-radius:var(--r-full);background:var(--blue-bg);color:var(--blue);font-weight:700;letter-spacing:.5px;}
.hdr-sub{font-size:11px;color:var(--text3);margin-top:3px;}

/* ── Body ── */
.body{padding:14px 16px 32px;}

/* ── Card library ── */
.section-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.7px;text-transform:uppercase;margin-bottom:8px;}
.card-lib{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 13px;margin-bottom:12px;}
.card-chips{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.chip{display:flex;align-items:center;gap:7px;padding:8px 11px;border-radius:var(--r-md);border:1px solid;cursor:pointer;transition:all .15s;user-select:none;}
.chip.off{opacity:.35;border-color:var(--border) !important;background:transparent !important;}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.chip-info{min-width:0;}
.chip-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chip-bank{font-size:10px;opacity:.6;margin-top:1px;}

/* ── DAWHO tier ── */
.tier-row{display:flex;align-items:center;gap:8px;margin-top:9px;padding-top:9px;border-top:1px solid var(--border);}
.tier-label{font-size:11px;color:var(--text2);white-space:nowrap;}
.tier-btns{display:flex;gap:5px;flex:1;}
.tbtn{flex:1;padding:5px 0;border-radius:var(--r-full);border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
.tbtn.on{border-color:#B82C0E55;background:#B82C0E18;color:#F06040;}

/* ── Detect box ── */
.detect-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 13px;margin-bottom:12px;}
.input-row{display:flex;gap:8px;align-items:center;}
.store-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-md);padding:9px 12px;font-size:13px;color:var(--text);font-family:inherit;outline:none;transition:border-color .15s;min-width:0;}
.store-input:focus{border-color:var(--blue-border);}
.store-input::placeholder{color:var(--text3);}
.gps-btn{width:40px;height:40px;border-radius:var(--r-md);border:1px solid var(--blue-border);background:var(--blue-bg);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.gps-btn:hover{background:rgba(91,142,255,0.25);}
.gps-btn svg{width:18px;height:18px;fill:none;stroke:var(--blue);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform .3s;}
.gps-btn.spinning svg{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loc-status{margin-top:8px;font-size:11px;display:flex;align-items:flex-start;gap:6px;line-height:1.4;}
.loc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.matched-pill{display:inline-flex;align-items:center;gap:5px;margin-top:7px;padding:5px 10px;border-radius:var(--r-full);font-size:11px;font-weight:600;}
.sug-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.sug{padding:4px 10px;border-radius:var(--r-full);border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:11px;cursor:pointer;font-family:inherit;transition:all .12s;}
.sug:hover{border-color:var(--blue-border);color:var(--blue);background:var(--blue-bg);}

/* ── Amount ── */
.amt-box{display:flex;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:10px 13px;margin-bottom:12px;}
.amt-label{font-size:12px;color:var(--text2);margin-right:6px;white-space:nowrap;}
.amt-cur{font-size:13px;color:var(--text3);}
.amt-input{flex:1;background:transparent;border:none;outline:none;font-size:22px;font-weight:800;color:var(--text);text-align:right;font-family:inherit;-moz-appearance:textfield;min-width:0;}
.amt-input::-webkit-inner-spin-button{display:none;}

/* ── Wallets ── */
.wallet-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px;}
.wtab{padding:9px 6px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:11px;font-weight:500;text-align:center;cursor:pointer;transition:all .15s;font-family:inherit;}
.wtab.on{border-color:var(--blue-border);background:var(--blue-bg);color:var(--blue);font-weight:700;}
.wtab-icon{font-size:16px;display:block;margin-bottom:2px;}

/* ── Scenes ── */
.scene-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;margin-bottom:7px;-webkit-tap-highlight-color:transparent;}
.scene-toggle{font-size:10px;color:var(--blue);font-weight:600;}
.scene-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.sbtn{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:var(--r-full);border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;}
.sbtn.on{border-color:var(--blue-border);background:var(--blue-bg);color:var(--blue);font-weight:700;}
.sbtn.gps-match{border-color:var(--green-border);background:var(--green-bg);color:var(--green);}

/* ── Scene banner ── */
.scene-banner{border-radius:var(--r-lg);padding:12px 14px;margin-bottom:11px;display:flex;align-items:center;gap:11px;}
.scene-icon{font-size:24px;flex-shrink:0;}
.banner-main{font-size:14px;font-weight:700;}
.banner-sub{font-size:10px;opacity:.5;margin-top:1px;}
.banner-saving{margin-left:auto;text-align:right;flex-shrink:0;}
.saving-label{font-size:9px;opacity:.5;}
.saving-num{font-size:18px;font-weight:800;margin-top:1px;}

/* ── Result rows ── */
.result-list{display:flex;flex-direction:column;gap:7px;}
.rrow{display:flex;align-items:center;gap:10px;padding:12px 13px;border-radius:var(--r-lg);border:1px solid var(--border);background:var(--bg2);transition:all .2s;}
.rrow.best{border-width:1.5px;}
.avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;letter-spacing:.2px;flex-shrink:0;}
.rrow-body{flex:1;min-width:0;}
.rrow-name{font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:2px;}
.best-tag{font-size:9px;font-weight:700;padding:1px 6px;border-radius:var(--r-full);color:#fff;letter-spacing:.3px;}
.rrow-note{font-size:10px;color:var(--text3);line-height:1.4;}
.rrow-right{text-align:right;flex-shrink:0;}
.rrow-save{font-size:15px;font-weight:800;}
.rrow-pct{font-size:9px;color:var(--text3);margin-top:1px;}

/* ── Cap bar ── */
.cap-wrap{margin-top:7px;}
.cap-bar-bg{height:4px;border-radius:var(--r-full);background:rgba(255,255,255,0.08);overflow:hidden;margin-bottom:3px;}
.cap-bar-fill{height:100%;border-radius:var(--r-full);transition:width .4s;}
.cap-text{font-size:9px;color:var(--text3);display:flex;justify-content:space-between;}
.cap-warn{font-size:10px;font-weight:700;margin-top:4px;display:flex;align-items:center;gap:4px;}
.cap-warn.warning{color:var(--amber);}
.cap-warn.full{color:var(--red);}

/* ── Log button ── */
.log-btn{width:100%;margin-top:10px;padding:11px;border-radius:var(--r-lg);border:1px solid var(--green-border);background:var(--green-bg);color:var(--green);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;}
.log-btn:hover{background:rgba(43,204,136,0.22);}

/* ── Monthly summary ── */
.monthly-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;margin-bottom:7px;-webkit-tap-highlight-color:transparent;}
.monthly-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.mrow{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px;}
.mrow-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.mrow-name{font-size:11px;font-weight:700;}
.mrow-badge{font-size:9px;padding:2px 7px;border-radius:var(--r-full);font-weight:700;}
.mrow-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.mrow-badge.warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.mrow-badge.full{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.mrow-items{display:flex;flex-direction:column;gap:5px;}
.mitem{font-size:10px;color:var(--text2);}
.mitem-bar{height:4px;border-radius:var(--r-full);background:rgba(255,255,255,0.08);overflow:hidden;margin:3px 0;}

/* ── Log modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:#1c1c28;border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:430px;}
.modal-title{font-size:16px;font-weight:800;margin-bottom:4px;}
.modal-sub{font-size:11px;color:var(--text3);margin-bottom:18px;}
.modal-amt-box{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-md);padding:10px 14px;margin-bottom:14px;}
.modal-amt-cur{font-size:14px;color:var(--text3);margin-right:6px;}
.modal-amt-input{flex:1;background:transparent;border:none;outline:none;font-size:26px;font-weight:800;color:var(--text);font-family:inherit;-moz-appearance:textfield;min-width:0;}
.modal-amt-input::-webkit-inner-spin-button{display:none;}
.modal-confirm{width:100%;padding:13px;border-radius:var(--r-lg);border:none;background:linear-gradient(135deg,#3B6EE8,#7B3FD4);color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:8px;}
.modal-cancel{width:100%;padding:10px;border-radius:var(--r-lg);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;}

/* ── Tip ── */
.tip{display:flex;gap:7px;align-items:flex-start;padding:9px 12px;border-radius:var(--r-md);margin-top:6px;border:1px solid var(--amber-border);background:var(--amber-bg);}
.tip-text{font-size:11px;color:var(--amber);line-height:1.5;}
.tip-name{font-weight:700;}

/* ── Footer ── */
.footer{margin-top:16px;font-size:10px;color:var(--text3);text-align:center;line-height:1.8;}

/* ── Empty state ── */
.empty{text-align:center;padding:24px 0;color:var(--text3);font-size:13px;}

/* ── Reset month ── */
.reset-btn{padding:6px 13px;border-radius:var(--r-full);border:1px solid var(--red-border);background:transparent;color:var(--red);font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;}
</style>

    <span class="app-title">刷卡助理</span>
    <span class="version-tag">v2</span>

  <div class="hdr-sub">玉山WORLD · 亞洲萬里通 · 永豐大戶 · CUBE</div>

<div class="body">

<!-- PWA install banner -->
<div id="install-banner" style="display:none;position:relative;background:#1c1c28;border:1px solid rgba(91,142,255,0.3);border-radius:12px;padding:11px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;">
  <div style="flex:1;min-width:0;">
    <div style="font-size:12px;font-weight:700;color:#f0f0f0">加入手機主畫面</div>
    <div style="font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px" id="install-hint"></div>
  </div>
  <button id="install-btn" style="background:rgba(91,142,255,0.2);border:1px solid rgba(91,142,255,0.4);border-radius:8px;padding:6px 12px;color:#5B8EFF;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0">安裝</button>
  <button onclick="document.getElementById('install-banner').style.display='none'" style="background:transparent;border:none;color:rgba(255,255,255,0.3);font-size:16px;cursor:pointer;padding:0 0 0 4px;line-height:1;">×</button>
</div>
<script>
let deferredPrompt=null;
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
const isInStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
if(!isInStandalone){
  if(isIOS){
    document.getElementById('install-hint').textContent='點 Safari 底部分享按鈕 → 「加入主畫面」';
    document.getElementById('install-banner').style.display='flex';
    document.getElementById('install-btn').onclick=()=>{};
  }
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();deferredPrompt=e;
    document.getElementById('install-hint').textContent='點「安裝」即可加入 Android 主畫面';
    document.getElementById('install-banner').style.display='flex';
    document.getElementById('install-btn').onclick=()=>{
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(()=>{document.getElementById('install-banner').style.display='none';});
    };
  });
}
</script>

const LS_KEY="card-advisor-v2";

function loadStorage(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return;
    const d=JSON.parse(raw);
    // 卡片啟用狀態
    if(d.active) CARDS.forEach(c=>{ if(d.active[c.id]!==undefined) c.active=d.active[c.id]; });
    // DAWHO 等級
    if(d.dawhoTier) dawhoTier=d.dawhoTier;
    // 本月記錄（附月份檢查）
    const thisMonth=new Date().toISOString().slice(0,7);
    if(d.month===thisMonth && d.monthlyLog) monthlyLog=d.monthlyLog;
    else monthlyLog={};
  }catch(e){}
}

function saveStorage(){
  const active={};
  CARDS.forEach(c=>active[c.id]=c.active);
  const thisMonth=new Date().toISOString().slice(0,7);
  localStorage.setItem(LS_KEY,JSON.stringify({active,dawhoTier,month:thisMonth,monthlyLog}));
}

function getMonthlySpent(cardId,key){
  return (monthlyLog[cardId]||{})[key]||0;
}

function getCap(cardId,sceneId,walletKey){
  if(cardId==="dawho"){
    // DAWHO 全局上限
    return CAPS.dawho._global[dawhoTier]||0;
  }
  return ((CAPS[cardId]||{})[sceneId]||{})[walletKey]??null;
}

// DAWHO 根據等級調整回饋率
function getDawhoRate(baseRate,sceneId,walletKey){
  const bonusMap={none:0,dawho:0.025,plus:0.04};
  // abroad/japan 場景海外基礎是 2%，一般是 1%
  const bonus=bonusMap[dawhoTier]||0;
  return baseRate+bonus;
}

// ─ 拿到含上限資訊的推薦條目 ──────────────────────────────────
function getCapInfo(cardId,sceneId,walletKey,rate){
  const wk=["direct","linepay","pxpay"][WI[walletKey]];
  let cap=null, spent=0, key=sceneId;

  if(cardId==="dawho"){
    cap=getCap(cardId,sceneId,wk);
    key="_global";
    // spent = 本月 dawho 全局累積回饋
    spent=getMonthlySpent(cardId,"_global");
  } else {
    cap=getCap(cardId,sceneId,wk);
    spent=getMonthlySpent(cardId,sceneId);
  }

  if(cap===null||cap===0) return {cap:null,pct:0,status:"ok",key};
  const pct=Math.min(1,spent/cap);
  const status=pct>=1?"full":pct>=0.8?"warning":"ok";
  return {cap,spent,pct,status,key};
}

  render();
}

// ═══════════════════════════════════════════════════════════════
// 場景 / 支付方式
// ═══════════════════════════════════════════════════════════════
function toggleScenes(){
  scenesOpen=!scenesOpen;
  document.getElementById("scene-grid").style.display=scenesOpen?"flex":"none";
  document.getElementById("stoggle").textContent=scenesOpen?"▴ 收起":"▾ 手動切換";

function setScene(id){

    if(btn)btn.classList.add("gps-match");

}

function manualScene(id){gpsScene=null;hideMatchedPill();setScene(id);}

function setW(el,w){

// ═══════════════════════════════════════════════════════════════
// 店名輸入
// ═══════════════════════════════════════════════════════════════
function onInput(){
  const v=document.getElementById("store-input").value.trim().toLowerCase();
  clearLocStatus();
  if(!v){hideMatchedPill();showSuggestions([]);return;}
  const s=matchKW(v);
  if(s){gpsScene=s;setScene(s);showMatchedPill(SCENES.find(x=>x.id===s),true);}
  else{gpsScene=null;showMatchedPill(null,false);}
  const sugs=KW.flatMap(k=>k.keys.filter(kk=>(kk.includes(v)||v.includes(kk))&&kk.length>1)).slice(0,6);
  showSuggestions([...new Set(sugs)]);
}

function matchKW(text){
  for(const k of KW)if(k.keys.some(kk=>text.includes(kk)||kk.includes(text)))return k.scene;
  return null;
}

function showMatchedPill(sc,ok){
  const el=document.getElementById("matched-pill");
  if(!sc&&!ok){
    el.textContent="請手動選擇消費場景";
    el.style.cssText="display:inline-flex;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);";
    return;
  }
  if(sc){
    el.textContent=sc.icon+" 識別為「"+sc.label+"」";
    el.style.cssText="display:inline-flex;background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);";
  }
}

function hideMatchedPill(){document.getElementById("matched-pill").style.display="none";}

function showSuggestions(list){
  const el=document.getElementById("sug-row");
  el.innerHTML="";
  list.forEach(s=>{
    const b=document.createElement("button");
    b.className="sug";b.textContent=s;
    b.onclick=()=>{document.getElementById("store-input").value=s;onInput();el.innerHTML="";};
    el.appendChild(b);
  });
}

// ═══════════════════════════════════════════════════════════════
// GPS（OpenStreetMap Nominatim）
// ═══════════════════════════════════════════════════════════════
function doGPS(){
  if(!navigator.geolocation){showLocStatus("此瀏覽器不支援定位","var(--red)");return;}
  const btn=document.getElementById("gps-btn");
  btn.classList.add("spinning");
  showLocStatus("取得 GPS 座標中…","var(--blue)");
  navigator.geolocation.getCurrentPosition(pos=>{
    btn.classList.remove("spinning");
    const {latitude:lat,longitude:lng}=pos.coords;
    // 簡易判斷是否在台灣境內
    const inTW=lat>21.5&&lat<25.5&&lng>119.5&&lng<122.5;
    if(!inTW){
      showLocStatus("偵測到海外位置，切換至「海外」場景","var(--amber)");
      gpsScene="abroad";setScene("abroad");
      showMatchedPill(SCENES.find(x=>x.id==="abroad"),true);
      return;
    }
    showLocStatus(`座標 ${lat.toFixed(4)}, ${lng.toFixed(4)} · 查詢附近商家…`,"var(--blue)");
    reverseGeocode(lat,lng);
  },err=>{
    btn.classList.remove("spinning");
    const msg=err.code===1?"請允許位置存取權限":err.code===3?"定位逾時":"無法取得位置";
    showLocStatus(msg+"，請手動輸入店名","var(--red)");
  },{timeout:12000,maximumAge:60000});
}

function reverseGeocode(lat,lng){
  fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=zh-TW&zoom=18`)
    .then(r=>r.json())
    .then(d=>{
      const addr=d.address||{};
      const name=[addr.amenity,addr.shop,addr.building].filter(Boolean)[0]||"";
      const road=[addr.road||addr.pedestrian,addr.suburb||addr.neighbourhood,addr.city||addr.town].filter(Boolean).join(" · ");
      const display=name||(road.split(" · ")[0])||d.display_name.split(",")[0];
      document.getElementById("store-input").value=display;
      const text=(display+" "+(d.type||"")+" "+(d.class||"")).toLowerCase();
      let scene=matchKW(text)||guessOSM(d.type,d.class);
      if(scene){
        gpsScene=scene;setScene(scene);
        showLocStatus(`📌 ${road||display}`,"var(--green)");
        showMatchedPill(SCENES.find(x=>x.id===scene),true);
      } else {
        showLocStatus(`📌 ${road||display} · 請手動選擇場景`,"var(--amber)");
        showMatchedPill(null,false);
      }
    })
    .catch(()=>showLocStatus("網路查詢失敗，請手動輸入店名","var(--red)"));
}

function guessOSM(type,cls){
  const k=(type||"")+" "+(cls||"");
  for(const[kk,v]of Object.entries(OSM_MAP))if(k.includes(kk))return v;
  return null;
}

function showLocStatus(text,color){
  const el=document.getElementById("loc-status");
  el.style.display="flex";
  el.innerHTML=`<div class="loc-dot" style="background:${color}"></div><span style="color:${color}">${text}</span>`;
}
function clearLocStatus(){document.getElementById("loc-status").style.display="none";}

// ═══════════════════════════════════════════════════════════════
// 渲染
// ═══════════════════════════════════════════════════════════════
function render(){
  const amt=parseFloat(document.getElementById("amt").value)||0;
  const pi=WI[curWallet];
  const wk=curWallet;
  const sc=SCENES.find(s=>s.id===curScene);
  const active=CARDS.filter(c=>c.active);

  if(!active.length){
    document.getElementById("scene-banner").innerHTML="";
    document.getElementById("results").innerHTML=`<div class="empty">請至少啟用一張卡片</div>`;
    document.getElementById("tip").innerHTML="";
    document.getElementById("log-btn").style.display="none";
    return;
  }

  const entries=active.map(c=>{
    const d=DB[curScene][c.id][pi];
    // DAWHO：根據等級調整回饋率
    let rate=d.r;
    if(c.id==="dawho"){
      const bonusMap={none:0,dawho:0.025,plus:0.04};
      const abroad=(curScene==="abroad"||curScene==="japan");
      const base=abroad?0.02:0.01; // 基礎率（海外2%，國內1%）
      rate=base+(bonusMap[dawhoTier]||0);
      // 特殊：pxpay abroad/japan保留原本值（海外不適用全支付）
      if(pi===2) rate=d.r;
    }
    const capInfo=getCapInfo(c.id,curScene,wk,rate);
    // 若上限已達，實際回饋率掉回基礎
    let effectiveRate=rate;
    if(capInfo.cap!==null&&capInfo.pct>=1){
      effectiveRate=c.id==="dawho"?
        (curScene==="abroad"||curScene==="japan"?0.02:0.01):
        (c.id==="esun"?0.004:d.r);
    }
    return{id:c.id,rate:effectiveRate,origRate:rate,note:d.n,tip:d.t,saving:amt*effectiveRate,capInfo};
  }).sort((a,b)=>b.rate-a.rate);

  const best=entries[0];
  lastBest={cardId:best.id,sceneId:curScene,walletKey:wk,rate:best.origRate};
  const bc=CARDS.find(c=>c.id===best.id);
  const diff=(best.saving-(entries[entries.length-1].saving)).toFixed(1);

  // Banner
  const banner=document.getElementById("scene-banner");
  banner.style.cssText=`background:${bc.color}18;border:1px solid ${bc.color}33;border-radius:var(--r-lg);padding:12px 14px;margin-bottom:11px;display:flex;align-items:center;gap:11px;`;
  banner.innerHTML=`
    <span class="scene-icon">${sc.icon}</span>
    <div><div class="banner-main">${sc.label}</div><div class="banner-sub">${sc.sub}</div></div>
    <div class="banner-saving">
      <div class="saving-label">最高省下</div>
      <div class="saving-num" style="color:${bc.light}">+$${diff}</div>
    </div>`;

  // Results
  const rl=document.getElementById("results");
  rl.innerHTML="";
  entries.forEach((e,i)=>{
    const c=CARDS.find(x=>x.id===e.id);
    const isBest=i===0;
    const isJpPx=curWallet==="pxpay"&&curScene==="japan";
    const ci=e.capInfo;

    // Cap HTML
    let capHtml="";
    if(ci.cap!==null){
      const pct=ci.pct;
      const barColor=pct>=1?"var(--red)":pct>=0.8?"var(--amber)":"var(--green)";
      const warnHtml=pct>=1?
        `<div class="cap-warn full">⛔ 本月上限已達，回饋率已降低</div>`:
        pct>=0.8?
        `<div class="cap-warn warning">⚠️ 本月快到上限了！剩餘 NT$${(ci.cap-ci.spent).toFixed(0)}</div>`:"";
      capHtml=`
        <div class="cap-wrap">
          <div class="cap-text"><span>月上限 NT$${ci.cap}</span><span>${Math.round(pct*100)}% 已用</span></div>
          <div class="cap-bar-bg"><div class="cap-bar-fill" style="width:${Math.round(pct*100)}%;background:${barColor}"></div></div>
          ${warnHtml}
        </div>`;
    }

    const div=document.createElement("div");
    div.className="rrow"+(isBest?" best":"");
    div.style.cssText=isBest?
      `background:${c.color}18;border-color:${c.color}55;border-width:1.5px;border-style:solid;border-radius:var(--r-lg);`:
      `background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);`;
    div.innerHTML=`
      <div class="avatar" style="background:linear-gradient(135deg,${c.color},${c.light})">${c.bank.slice(0,2)}</div>
      <div class="rrow-body">
        <div class="rrow-name">
          <span>${c.name}</span>
          ${isBest?`<span class="best-tag" style="background:${c.color}">${isJpPx?"🔥最強":"最划算"}</span>`:""}
        </div>
        <div class="rrow-note">${e.note}</div>
        ${capHtml}
      </div>
      <div class="rrow-right">
        <div class="rrow-save" style="color:${isBest?c.light:"var(--text2)"}">${e.rate>0?"$"+e.saving.toFixed(1):"—"}</div>
        <div class="rrow-pct">${(e.rate*100).toFixed(2)}%</div>
      </div>`;
    rl.appendChild(div);
  });

  // Tip
  const tips=entries.filter(e=>e.tip).slice(0,1);
  const tb=document.getElementById("tip");
  if(tips.length){
    const c=CARDS.find(x=>x.id===tips[0].id);
    tb.innerHTML=`<div class="tip"><span style="font-size:13px;flex-shrink:0">⚠️</span><div class="tip-text"><span class="tip-name">${c.name}</span>・${tips[0].tip}</div></div>`;
  }else tb.innerHTML="";

  // Log button
  document.getElementById("log-btn").style.display=active.length?"flex":"none";

  // Refresh monthly panel if open
  if(monthlyOpen) renderMonthly();
}

// ═══════════════════════════════════════════════════════════════
// 記錄消費
// ═══════════════════════════════════════════════════════════════
function openLogModal(){
  if(!lastBest) return;
  const c=CARDS.find(x=>x.id===lastBest.cardId);
  const sc=SCENES.find(x=>x.id===lastBest.sceneId);
  document.getElementById("modal-sub").textContent=
    `${c.name}・${sc.label}・${(lastBest.rate*100).toFixed(2)}% 回饋`;
  document.getElementById("modal-amt").value=document.getElementById("amt").value||"";
  document.getElementById("log-modal").style.display="flex";
}

function closeLogModal(){document.getElementById("log-modal").style.display="none";}

function confirmLog(){
  const raw=document.getElementById("modal-amt").value;
  const amt=parseFloat(raw);
  if(!amt||amt<=0){alert("請輸入正確金額");return;}
  const {cardId,sceneId,rate}=lastBest;
  const cashback=amt*rate;

  if(!monthlyLog[cardId]) monthlyLog[cardId]={};

  if(cardId==="dawho"){
    // DAWHO 累積全局回饋
    const bonusMap={none:0,dawho:0.025,plus:0.04};
    const bonusRate=bonusMap[dawhoTier]||0;
    const bonusCashback=amt*bonusRate;
    monthlyLog[cardId]._global=(monthlyLog[cardId]._global||0)+bonusCashback;
  } else {
    monthlyLog[cardId][sceneId]=(monthlyLog[cardId][sceneId]||0)+cashback;
  }

  saveStorage();
  closeLogModal();
  render();
  if(monthlyOpen) renderMonthly();
}

// ═══════════════════════════════════════════════════════════════
// 本月追蹤面板
// ═══════════════════════════════════════════════════════════════
function toggleMonthly(){
  monthlyOpen=!monthlyOpen;
  const grid=document.getElementById("monthly-grid");
  grid.style.display=monthlyOpen?"flex":"none";
  document.getElementById("mtoggle").textContent=monthlyOpen?"▴ 收起":"▾ 展開";
  if(monthlyOpen) renderMonthly();
}

function renderMonthly(){
  const grid=document.getElementById("monthly-grid");
  const active=CARDS.filter(c=>c.active);
  if(!active.length){grid.innerHTML=`<div class="empty">請至少啟用一張卡片</div>`;return;}

  grid.innerHTML=active.map(c=>{
    const clog=monthlyLog[c.id]||{};
    let rows=[];

    if(c.id==="dawho"){
      const cap=CAPS.dawho._global[dawhoTier]||0;
      const spent=clog._global||0;
      if(cap>0){
        const pct=Math.min(1,spent/cap);
        const barColor=pct>=1?"var(--red)":pct>=0.8?"var(--amber)":"var(--green)";
        rows.push(`
          <div class="mitem">
            <div style="display:flex;justify-content:space-between">
              <span>額外回饋上限（${dawhoTier==="plus"?"Plus":dawhoTier==="dawho"?"大戶":"一般"}）</span>
              <span style="color:${pct>=1?"var(--red)":pct>=0.8?"var(--amber)":"var(--text2)"}">${spent.toFixed(0)} / ${cap}</span>
            </div>
            <div class="mitem-bar"><div style="height:100%;border-radius:999px;background:${barColor};width:${Math.round(pct*100)}%"></div></div>
          </div>`);
      } else {
        rows.push(`<div class="mitem" style="color:var(--text3)">一般等級無額外回饋上限</div>`);
      }
    } else {
      const capDefs=CAPS[c.id]||{};
      const relevantScenes=Object.keys(capDefs);
      if(relevantScenes.length===0){
        rows.push(`<div class="mitem" style="color:var(--text3)">此卡無月回饋上限</div>`);
      } else {
        relevantScenes.forEach(sid=>{
          const cap=(capDefs[sid]||{}).direct;
          if(!cap) return;
          const spent=clog[sid]||0;
          const pct=Math.min(1,spent/cap);
          const barColor=pct>=1?"var(--red)":pct>=0.8?"var(--amber)":"var(--green)";
          const sc=SCENES.find(x=>x.id===sid);
          rows.push(`
            <div class="mitem">
              <div style="display:flex;justify-content:space-between">
                <span>${sc?sc.icon+" "+sc.label:sid}</span>
                <span style="color:${pct>=1?"var(--red)":pct>=0.8?"var(--amber)":"var(--text2)"}">${spent.toFixed(0)} / ${cap}</span>
              </div>
              <div class="mitem-bar"><div style="height:100%;border-radius:999px;background:${barColor};width:${Math.round(pct*100)}%"></div></div>
            </div>`);
        });
      }
    }

    // 整體警示等級
    const allPct=Object.entries(monthlyLog[c.id]||{}).map(([k,v])=>{
      if(c.id==="dawho") return{pct:Math.min(1,v/(CAPS.dawho._global[dawhoTier]||1))};
      const cap=((CAPS[c.id]||{})[k]||{}).direct;
      return cap?{pct:Math.min(1,v/cap)}:{pct:0};
    });
    const maxPct=allPct.length?Math.max(...allPct.map(x=>x.pct)):0;
    const badgeClass=maxPct>=1?"full":maxPct>=0.8?"warn":"ok";
    const badgeText=maxPct>=1?"⛔ 已達上限":maxPct>=0.8?"⚠️ 快到上限":"✓ 正常";

    return `<div class="mrow">
      <div class="mrow-header">
        <div class="mrow-name" style="color:${c.light}">${c.name}</div>
        <div class="mrow-badge ${badgeClass}">${badgeText}</div>
      </div>
      <div class="mrow-items">${rows.join("")}</div>
    </div>`;
  }).join("");
}

function resetMonth(){
  if(!confirm("確定要重置本月所有消費記錄？")) return;
  monthlyLog={};
  saveStorage();
  render();
  if(monthlyOpen) renderMonthly();
}
</script>

<script>
if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='card-advisor-v2';
    const ASSETS=[self.location.pathname];
    self.addEventListener('install',e=>{
      e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));
      self.skipWaiting();
    });
    self.addEventListener('activate',e=>{
      e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch',e=>{
      if(e.request.url.includes('nominatim')||e.request.url.includes('fonts.g')) return;
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>r)));
    });
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
