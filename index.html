<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0e0e16;--bg2:#181820;--bg3:#22222c;--bg4:#2a2a36;
  --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16);
  --text:#f2f2f2;--text2:rgba(255,255,255,0.6);--text3:rgba(255,255,255,0.35);
  --blue:#5B8EFF;--blue-bg:rgba(91,142,255,0.14);--blue-border:rgba(91,142,255,0.4);
  --green:#2BCC88;--green-bg:rgba(43,204,136,0.14);--green-border:rgba(43,204,136,0.4);
  --amber:#F5C242;--amber-bg:rgba(245,194,66,0.13);--amber-border:rgba(245,194,66,0.38);
  --red:#F06060;--red-bg:rgba(240,96,96,0.13);--red-border:rgba(240,96,96,0.38);
  --r:10px;--r-lg:16px;--r-xl:20px;--r-full:999px;
}
html,body{
  background:var(--bg);
  font-family:'Noto Sans TC',system-ui,sans-serif;
  color:var(--text);
  min-height:100%;
  -webkit-font-smoothing:antialiased;
  font-size:16px;
}

/* ── Header ── */
.hdr{
  padding:20px 18px 16px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  position:sticky;top:0;z-index:50;
}
.hdr-row{display:flex;align-items:center;gap:10px;}
.app-icon{
  width:36px;height:36px;border-radius:11px;
  background:linear-gradient(135deg,#3B6EE8,#7B3FD4);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.app-icon svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.app-title{font-size:18px;font-weight:900;letter-spacing:.3px;}
.version-tag{
  font-size:10px;padding:3px 8px;border-radius:var(--r-full);
  background:var(--blue-bg);color:var(--blue);font-weight:700;
}
.hdr-sub{font-size:12px;color:var(--text3);margin-top:4px;}

/* ── Body ── */
.body{padding:16px 16px 40px;}

/* ── Section label ── */
.section-label{
  font-size:12px;font-weight:700;color:var(--text3);
  letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;
}

/* ── Card lib ── */
.card-lib{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-xl);padding:14px 15px;margin-bottom:16px;}
.card-chips{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.chip{
  display:flex;align-items:center;gap:9px;
  padding:11px 13px;border-radius:var(--r-lg);border:1px solid;
  cursor:pointer;transition:all .15s;user-select:none;
}
.chip.off{opacity:.3;border-color:var(--border) !important;background:transparent !important;}
.chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.chip-info{min-width:0;}
.chip-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chip-bank{font-size:11px;opacity:.6;margin-top:2px;}

/* ── DAWHO tier ── */
.tier-row{display:flex;align-items:center;gap:9px;margin-top:11px;padding-top:11px;border-top:1px solid var(--border);}
.tier-label{font-size:12px;color:var(--text2);white-space:nowrap;font-weight:600;}
.tier-btns{display:flex;gap:6px;flex:1;}
.tbtn{
  flex:1;padding:7px 0;border-radius:var(--r-full);
  border:1px solid var(--border2);background:transparent;
  color:var(--text3);font-size:11px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all .15s;
}
.tbtn.on{border-color:#B82C0E55;background:#B82C0E18;color:#F06040;}

/* ── Detect box ── */
.detect-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-xl);padding:14px 15px;margin-bottom:16px;}
.input-row{display:flex;gap:9px;align-items:center;}
.store-input{
  flex:1;background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--r-lg);padding:12px 14px;
  font-size:15px;color:var(--text);font-family:inherit;
  outline:none;transition:border-color .15s;min-width:0;
}
.store-input:focus{border-color:var(--blue-border);}
.store-input::placeholder{color:var(--text3);}
.gps-btn{
  width:46px;height:46px;border-radius:var(--r-lg);
  border:1px solid var(--blue-border);background:var(--blue-bg);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;
}
.gps-btn:hover{background:rgba(91,142,255,.25);}
.gps-btn svg{width:20px;height:20px;fill:none;stroke:var(--blue);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform .3s;}
.gps-btn.spinning svg{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loc-status{margin-top:10px;font-size:13px;display:flex;align-items:flex-start;gap:7px;line-height:1.5;}
.loc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.matched-pill{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:9px;padding:7px 13px;border-radius:var(--r-full);
  font-size:13px;font-weight:600;
}
.sug-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;}
.sug{
  padding:6px 13px;border-radius:var(--r-full);
  border:1px solid var(--border2);background:var(--bg3);
  color:var(--text2);font-size:13px;cursor:pointer;
  font-family:inherit;transition:all .12s;
}
.sug:hover{border-color:var(--blue-border);color:var(--blue);background:var(--blue-bg);}

/* ── Amount ── */
.amt-box{
  display:flex;align-items:center;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r-xl);padding:14px 16px;margin-bottom:16px;
}
.amt-label{font-size:15px;color:var(--text2);margin-right:8px;white-space:nowrap;font-weight:600;}
.amt-input{
  flex:1;background:transparent;border:none;outline:none;
  font-size:36px;font-weight:900;color:var(--text);
  text-align:right;font-family:inherit;
  -moz-appearance:textfield;min-width:0;
}
.amt-input::-webkit-inner-spin-button{display:none;}

/* ── Wallets ── */
.wallet-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:16px;}
.wtab{
  padding:12px 6px;border-radius:var(--r-lg);
  border:1px solid var(--border);background:var(--bg2);
  color:var(--text2);font-size:13px;font-weight:600;
  text-align:center;cursor:pointer;transition:all .15s;font-family:inherit;
}
.wtab.on{border-color:var(--blue-border);background:var(--blue-bg);color:var(--blue);font-weight:800;}
.wtab-icon{font-size:20px;display:block;margin-bottom:4px;}

/* ── Scenes ── */
.scene-header{
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;margin-bottom:10px;-webkit-tap-highlight-color:transparent;
}
.scene-toggle{font-size:12px;color:var(--blue);font-weight:700;}
.scene-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;}
.sbtn{
  display:inline-flex;align-items:center;gap:5px;
  padding:9px 14px;border-radius:var(--r-full);
  border:1px solid var(--border);background:var(--bg2);
  color:var(--text2);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;font-family:inherit;
}
.sbtn.on{border-color:var(--blue-border);background:var(--blue-bg);color:var(--blue);}
.sbtn.gps-match{border-color:var(--green-border);background:var(--green-bg);color:var(--green);}

/* ── Scene banner ── */
.scene-banner{
  border-radius:var(--r-xl);padding:16px;
  margin-bottom:14px;display:flex;align-items:center;gap:13px;
}
.scene-icon{font-size:28px;flex-shrink:0;}
.banner-main{font-size:17px;font-weight:800;}
.banner-sub{font-size:12px;opacity:.5;margin-top:2px;}
.banner-saving{margin-left:auto;text-align:right;flex-shrink:0;}
.saving-label{font-size:11px;opacity:.5;}
.saving-num{font-size:26px;font-weight:900;margin-top:2px;}

/* ── Result rows ── */
.result-list{display:flex;flex-direction:column;gap:10px;}
.rrow{
  display:flex;align-items:flex-start;gap:13px;
  padding:16px;border-radius:var(--r-xl);
  border:1px solid var(--border);background:var(--bg2);
  transition:all .2s;
}
.rrow.best{border-width:2px;}
.avatar{
  width:46px;height:46px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#fff;
  letter-spacing:.2px;flex-shrink:0;
}
.rrow-body{flex:1;min-width:0;}
.rrow-name{
  font-size:16px;font-weight:800;
  display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px;
}
.best-tag{
  font-size:10px;font-weight:800;padding:3px 9px;
  border-radius:var(--r-full);color:#fff;letter-spacing:.3px;
}
.rrow-note{font-size:13px;color:var(--text2);line-height:1.5;}
.rrow-right{text-align:right;flex-shrink:0;}
.rrow-save{font-size:22px;font-weight:900;}
.rrow-pct{font-size:12px;color:var(--text3);margin-top:2px;font-weight:600;}

/* ── Cap bar ── */
.cap-wrap{margin-top:10px;}
.cap-bar-bg{height:5px;border-radius:var(--r-full);background:rgba(255,255,255,0.08);overflow:hidden;margin-bottom:4px;}
.cap-bar-fill{height:100%;border-radius:var(--r-full);transition:width .4s;}
.cap-text{font-size:12px;color:var(--text3);display:flex;justify-content:space-between;margin-bottom:4px;font-weight:500;}
.cap-warn{font-size:12px;font-weight:700;margin-top:5px;display:flex;align-items:center;gap:4px;}
.cap-warn.warning{color:var(--amber);}
.cap-warn.full{color:var(--red);}

/* ── Log button ── */
.log-btn{
  width:100%;margin-top:12px;padding:16px;
  border-radius:var(--r-xl);border:1px solid var(--green-border);
  background:var(--green-bg);color:var(--green);
  font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all .15s;
}
.log-btn:hover{background:rgba(43,204,136,.22);}

/* ── Monthly summary ── */
.monthly-header{
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;margin-bottom:10px;-webkit-tap-highlight-color:transparent;
}
.monthly-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.mrow{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-xl);padding:14px 16px;}
.mrow-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.mrow-name{font-size:15px;font-weight:800;}
.mrow-badge{font-size:11px;padding:4px 10px;border-radius:var(--r-full);font-weight:700;}
.mrow-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.mrow-badge.warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.mrow-badge.full{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.mrow-items{display:flex;flex-direction:column;gap:8px;}
.mitem{font-size:13px;color:var(--text2);}
.mitem-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px;}
.mitem-bar{height:5px;border-radius:var(--r-full);background:rgba(255,255,255,0.08);overflow:hidden;}

/* ── Log modal ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:100;display:flex;align-items:flex-end;justify-content:center;
}
.modal{
  background:#1c1c28;border:1px solid var(--border2);
  border-radius:24px 24px 0 0;padding:28px 20px 36px;
  width:100%;max-width:430px;
}
.modal-title{font-size:19px;font-weight:900;margin-bottom:5px;}
.modal-sub{font-size:13px;color:var(--text3);margin-bottom:20px;}
.modal-amt-box{
  display:flex;align-items:center;background:var(--bg3);
  border:1px solid var(--border2);border-radius:var(--r-lg);
  padding:12px 16px;margin-bottom:16px;
}
.modal-amt-cur{font-size:15px;color:var(--text3);margin-right:8px;font-weight:600;}
.modal-amt-input{
  flex:1;background:transparent;border:none;outline:none;
  font-size:32px;font-weight:900;color:var(--text);
  font-family:inherit;-moz-appearance:textfield;min-width:0;
}
.modal-amt-input::-webkit-inner-spin-button{display:none;}
.modal-confirm{
  width:100%;padding:16px;border-radius:var(--r-lg);border:none;
  background:linear-gradient(135deg,#3B6EE8,#7B3FD4);
  color:#fff;font-size:16px;font-weight:800;cursor:pointer;
  font-family:inherit;margin-bottom:10px;
}
.modal-cancel{
  width:100%;padding:12px;border-radius:var(--r-lg);
  border:1px solid var(--border2);background:transparent;
  color:var(--text2);font-size:14px;cursor:pointer;font-family:inherit;
}

/* ── Tip ── */
.tip{
  display:flex;gap:8px;align-items:flex-start;
  padding:12px 14px;border-radius:var(--r-lg);margin-top:8px;
  border:1px solid var(--amber-border);background:var(--amber-bg);
}
.tip-text{font-size:13px;color:var(--amber);line-height:1.6;}
.tip-name{font-weight:800;}

/* ── Footer ── */
.footer{margin-top:20px;font-size:12px;color:var(--text3);text-align:center;line-height:2;}

/* ── Empty state ── */
.empty{text-align:center;padding:28px 0;color:var(--text3);font-size:15px;}

/* ── Reset btn ── */
.reset-btn{
  padding:7px 14px;border-radius:var(--r-full);
  border:1px solid var(--red-border);background:transparent;
  color:var(--red);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;
}
</style>

<body>

<!-- Header -->
<div class="hdr">
  <div class="hdr-row">
    <div class="app-icon">
      <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/><path d="M6 15h4"/><path d="M14 15h4"/></svg>
    </div>
    <span class="app-title">刷卡助理</span>
    <span class="version-tag">v2</span>
  </div>
  <div class="hdr-sub">玉山WORLD · 亞洲萬里通 · 永豐大戶 · CUBE</div>
</div>

<div class="body">

  <!-- 卡庫 -->
  <div class="section-label">我的卡庫</div>
  <div class="card-lib">
    <div class="card-chips" id="card-chips"></div>
    <div class="tier-row" id="tier-row" style="display:none">
      <span class="tier-label">大戶等級</span>
      <div class="tier-btns">
        <button class="tbtn" data-tier="none"  onclick="setDawhoTier('none')">一般</button>
        <button class="tbtn" data-tier="dawho" onclick="setDawhoTier('dawho')">大戶</button>
        <button class="tbtn" data-tier="plus"  onclick="setDawhoTier('plus')">大戶 Plus</button>
      </div>
    </div>
  </div>

  <!-- 消費地點 -->
  <div class="section-label">消費地點</div>
  <div class="detect-box">
    <div class="input-row">
      <input class="store-input" id="store-input" placeholder="輸入店名，或點右側 GPS 定位…" oninput="onInput()" autocomplete="off">
      <button class="gps-btn" id="gps-btn" onclick="doGPS()" aria-label="GPS定位">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8" stroke-dasharray="4 2"/></svg>
      </button>
    </div>
    <div id="loc-status" style="display:none" class="loc-status"></div>
    <div id="matched-pill" style="display:none" class="matched-pill"></div>
    <div id="sug-row" class="sug-row"></div>
  </div>

  <!-- 金額 -->
  <div class="section-label">消費金額</div>
  <div class="amt-box">
    <span class="amt-label">NT$</span>
    <input class="amt-input" type="number" id="amt" value="500" min="1" oninput="render()">
  </div>

  <!-- 支付方式 -->
  <div class="section-label">支付方式</div>
  <div class="wallet-row" id="wallets">
    <button class="wtab on" onclick="setW(this,'direct')"><span class="wtab-icon">💳</span>直接刷卡</button>
    <button class="wtab" onclick="setW(this,'linepay')"><span class="wtab-icon">💬</span>LINE Pay</button>
    <button class="wtab" onclick="setW(this,'pxpay')"><span class="wtab-icon">🛒</span>全支付</button>
  </div>

  <!-- 場景 -->
  <div class="scene-header" onclick="toggleScenes()">
    <div class="section-label" style="margin:0">消費場景</div>
    <span class="scene-toggle" id="stoggle">▾ 手動切換</span>
  </div>
  <div class="scene-grid" id="scene-grid" style="display:none"></div>

  <!-- Banner -->
  <div id="scene-banner" class="scene-banner"></div>

  <!-- 結果 -->
  <div class="section-label">推薦刷卡順序</div>
  <div id="results" class="result-list"></div>
  <div id="tip"></div>

  <!-- 記錄消費 -->
  <button class="log-btn" id="log-btn" style="display:none" onclick="openLogModal()">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    記錄此消費（套用最佳推薦）
  </button>

  <!-- 本月追蹤 -->
  <div style="margin-top:22px;">
    <div class="monthly-header" onclick="toggleMonthly()">
      <div class="section-label" style="margin:0">本月回饋追蹤</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="reset-btn" onclick="event.stopPropagation();resetMonth()">重置</button>
        <span class="scene-toggle" id="mtoggle">▾ 展開</span>
      </div>
    </div>
    <div id="monthly-grid" class="monthly-grid" style="display:none"></div>
  </div>

  <div class="footer">
    回饋率依各銀行公告為準 · 資料更新至 2026/05<br>
    亞洲萬里通以 1 里 ≈ NT$0.45 折算 · GPS 使用 OSM，座標不上傳
  </div>
</div>

<!-- 記錄 Modal -->
<div id="log-modal" class="modal-bg" style="display:none" onclick="if(event.target===this)closeLogModal()">
  <div class="modal">
    <div class="modal-title">記錄消費</div>
    <div class="modal-sub" id="modal-sub">套用最佳推薦計算回饋</div>
    <div class="modal-amt-box">
      <span class="modal-amt-cur">NT$</span>
      <input class="modal-amt-input" type="number" id="modal-amt" placeholder="0" min="1">
    </div>
    <button class="modal-confirm" onclick="confirmLog()">確認記錄</button>
    <button class="modal-cancel" onclick="closeLogModal()">取消</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// 資料
// ═══════════════════════════════════════════════
const CARDS=[
  {id:"esun",  name:"玉山 WORLD",  bank:"玉山銀行", color:"#1A4A9B", light:"#5B8EFF", active:true},
  {id:"am",    name:"亞洲萬里通",  bank:"國泰世華", color:"#006644", light:"#2BCC88", active:true},
  {id:"dawho", name:"大戶 DAWHO",  bank:"永豐銀行", color:"#B82C0E", light:"#F06040", active:true},
  {id:"cube",  name:"CUBE 卡",     bank:"國泰世華", color:"#4B2E9A", light:"#9B6CF0", active:true},
];
const SCENES=[
  {id:"convenience",label:"便利商店",icon:"🏪",sub:"7-11・全家"},

// ── 狀態 ────────────────────────────────────────────────
let curScene="convenience",curWallet="direct",scenesOpen=false,gpsScene=null;
let dawhoTier="none",monthlyOpen=false;
let monthlyLog={},lastBest=null;
const LS_KEY="card-advisor-v2";

function loadStorage(){
  try{
    const d=JSON.parse(localStorage.getItem(LS_KEY)||'{}');
    if(d.active) CARDS.forEach(c=>{if(d.active[c.id]!==undefined)c.active=d.active[c.id];});
    if(d.dawhoTier) dawhoTier=d.dawhoTier;
    const m=new Date().toISOString().slice(0,7);
    if(d.month===m&&d.monthlyLog) monthlyLog=d.monthlyLog;
    else monthlyLog={};
  }catch(e){}
}
function saveStorage(){
  const active={};CARDS.forEach(c=>active[c.id]=c.active);
  localStorage.setItem(LS_KEY,JSON.stringify({active,dawhoTier,month:new Date().toISOString().slice(0,7),monthlyLog}));
}

// ── 初始化 ──────────────────────────────────────────────
(function init(){
  loadStorage();
  const cc=document.getElementById("card-chips");
  CARDS.forEach(c=>{
    const el=document.createElement("div");
    el.className="chip"+(c.active?"":" off");
    el.style.background=c.active?c.color+"1A":"transparent";
    el.style.borderColor=c.active?c.color+"44":"";
    el.dataset.id=c.id;
    el.innerHTML=`<div class="chip-dot" style="background:${c.light}"></div>
      <div class="chip-info">
        <div class="chip-name" style="color:${c.light}">${c.name}</div>
        <div class="chip-bank" style="color:${c.light}">${c.bank}</div>
      </div>`;
    el.onclick=()=>toggleCard(c.id,el);
    cc.appendChild(el);
  });
  updateTierRow();updateTierBtns();
  const sg=document.getElementById("scene-grid");
  SCENES.forEach(s=>{
    const b=document.createElement("button");
    b.className="sbtn"+(s.id===curScene?" on":"");
    b.dataset.id=s.id;b.innerHTML=`${s.icon} ${s.label}`;
    b.onclick=()=>manualScene(s.id);
    sg.appendChild(b);
  });
  render();
})();

function toggleCard(id,el){
  const c=CARDS.find(x=>x.id===id);c.active=!c.active;
  el.classList.toggle("off",!c.active);
  el.style.background=c.active?c.color+"1A":"transparent";
  el.style.borderColor=c.active?c.color+"44":"";
  updateTierRow();saveStorage();render();
}
function updateTierRow(){
  const d=CARDS.find(c=>c.id==="dawho");
  document.getElementById("tier-row").style.display=d&&d.active?"flex":"none";
}
function setDawhoTier(t){dawhoTier=t;updateTierBtns();saveStorage();render();}
function updateTierBtns(){document.querySelectorAll(".tbtn").forEach(b=>b.classList.toggle("on",b.dataset.tier===dawhoTier));}
function toggleScenes(){
  scenesOpen=!scenesOpen;
  document.getElementById("scene-grid").style.display=scenesOpen?"flex":"none";
  document.getElementById("stoggle").textContent=scenesOpen?"▴ 收起":"▾ 手動切換";
}
function setScene(id){
  curScene=id;
  document.querySelectorAll(".sbtn").forEach(b=>{b.classList.toggle("on",b.dataset.id===id);b.classList.remove("gps-match");});
  if(gpsScene===id){const btn=document.querySelector(`.sbtn[data-id="${id}"]`);if(btn)btn.classList.add("gps-match");}
  render();
}
function manualScene(id){gpsScene=null;hideMatchedPill();setScene(id);}
function setW(el,w){document.querySelectorAll(".wtab").forEach(x=>x.classList.remove("on"));el.classList.add("on");curWallet=w;render();}

function onInput(){
  const v=document.getElementById("store-input").value.trim().toLowerCase();
  clearLocStatus();
  if(!v){hideMatchedPill();showSuggestions([]);return;}
  const s=matchKW(v);
  if(s){gpsScene=s;setScene(s);showMatchedPill(SCENES.find(x=>x.id===s),true);}
  else{gpsScene=null;showMatchedPill(null,false);}
  const sugs=KW.flatMap(k=>k.keys.filter(kk=>(kk.includes(v)||v.includes(kk))&&kk.length>1)).slice(0,6);
  showSuggestions([...new Set(sugs)]);
}
function matchKW(text){for(const k of KW)if(k.keys.some(kk=>text.includes(kk)||kk.includes(text)))return k.scene;return null;}
function showMatchedPill(sc,ok){
  const el=document.getElementById("matched-pill");
  if(!sc&&!ok){
    el.textContent="請手動選擇消費場景";
    el.style.cssText="display:inline-flex;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);";return;
  }
  if(sc){el.textContent=sc.icon+" 識別為「"+sc.label+"」";el.style.cssText="display:inline-flex;background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);";}
}
function hideMatchedPill(){document.getElementById("matched-pill").style.display="none";}
function showSuggestions(list){
  const el=document.getElementById("sug-row");el.innerHTML="";
  list.forEach(s=>{const b=document.createElement("button");b.className="sug";b.textContent=s;b.onclick=()=>{document.getElementById("store-input").value=s;onInput();el.innerHTML="";};el.appendChild(b);});
}
function showLocStatus(text,color){
  const el=document.getElementById("loc-status");el.style.display="flex";
  el.innerHTML=`<div class="loc-dot" style="background:${color}"></div><span style="color:${color}">${text}</span>`;
}
function clearLocStatus(){document.getElementById("loc-status").style.display="none";}

function doGPS(){
  if(!navigator.geolocation){showLocStatus("此瀏覽器不支援定位","var(--red)");return;}
  const btn=document.getElementById("gps-btn");btn.classList.add("spinning");
  showLocStatus("取得 GPS 座標中…","var(--blue)");
  navigator.geolocation.getCurrentPosition(pos=>{
    btn.classList.remove("spinning");
    const{latitude:lat,longitude:lng}=pos.coords;
    const inTW=lat>21.5&&lat<25.5&&lng>119.5&&lng<122.5;
    if(!inTW){showLocStatus("偵測到海外位置，切換至「海外」","var(--amber)");gpsScene="abroad";setScene("abroad");showMatchedPill(SCENES.find(x=>x.id==="abroad"),true);return;}
    showLocStatus(`座標 ${lat.toFixed(4)}, ${lng.toFixed(4)} · 查詢附近商家…`,"var(--blue)");
    reverseGeocode(lat,lng);
  },err=>{
    btn.classList.remove("spinning");
    showLocStatus(err.code===1?"請允許位置存取權限":err.code===3?"定位逾時":"無法取得位置","var(--red)");
  },{timeout:12000,maximumAge:60000});
}
function reverseGeocode(lat,lng){
  fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=zh-TW&zoom=18`)
    .then(r=>r.json()).then(d=>{
      const addr=d.address||{};
      const name=[addr.amenity,addr.shop,addr.building].filter(Boolean)[0]||"";
      const road=[addr.road||addr.pedestrian,addr.suburb||addr.neighbourhood,addr.city||addr.town].filter(Boolean).join(" · ");
      const display=name||(road.split(" · ")[0])||d.display_name.split(",")[0];
      document.getElementById("store-input").value=display;
      const text=(display+" "+(d.type||"")+" "+(d.class||"")).toLowerCase();
      let scene=matchKW(text)||guessOSM(d.type,d.class);
      if(scene){gpsScene=scene;setScene(scene);showLocStatus(`📌 ${road||display}`,"var(--green)");showMatchedPill(SCENES.find(x=>x.id===scene),true);}
      else{showLocStatus(`📌 ${road||display} · 請手動選擇場景`,"var(--amber)");showMatchedPill(null,false);}
    }).catch(()=>showLocStatus("查詢失敗，請手動輸入店名","var(--red)"));
}
function guessOSM(type,cls){const k=(type||"")+" "+(cls||"");for(const[kk,v]of Object.entries(OSM_MAP))if(k.includes(kk))return v;return null;}

// ── 上限輔助 ─────────────────────────────────────────────
function getCap(cardId){
  if(cardId==="dawho"){const c=CAPS.dawho._global[dawhoTier]||0;return c>0?c:null;}
  return((CAPS[cardId]||{})[curScene]||{})[curWallet]??null;
}
function getCapUsed(cardId){
  if(cardId==="dawho")return(monthlyLog[cardId]||{})._global||0;
  return(monthlyLog[cardId]||{})[curScene]||0;
}

// ── 渲染 ─────────────────────────────────────────────────
function render(){
  const amt=parseFloat(document.getElementById("amt").value)||0;
  const pi=WI[curWallet];
  const sc=SCENES.find(s=>s.id===curScene);
  const active=CARDS.filter(c=>c.active);
  if(!active.length){
    document.getElementById("scene-banner").innerHTML="";
    document.getElementById("results").innerHTML=`<div class="empty">請至少啟用一張卡片</div>`;
    document.getElementById("tip").innerHTML="";
    document.getElementById("log-btn").style.display="none";return;
  }
  const entries=active.map(c=>{
    const d=DB[curScene][c.id][pi];
    let rate=d.r;
    if(c.id==="dawho"&&pi!==2){
      const abroad=curScene==="abroad"||curScene==="japan";
      const bonus={none:0,dawho:.025,plus:.04}[dawhoTier]||0;
      rate=(abroad?.02:.01)+bonus;
    }
    const cap=getCap(c.id);
    const capUsed=getCapUsed(c.id);
    const capPct=cap!=null&&cap>0?Math.min(1,capUsed/cap):0;
    let effRate=rate;
    if(cap!=null&&capPct>=1){
      if(c.id==="dawho")effRate=curScene==="abroad"||curScene==="japan"?.02:.01;
      else if(c.id==="esun")effRate=.004;
    }
    return{id:c.id,rate:effRate,origRate:rate,note:d.n,tip:d.t,saving:amt*effRate,cap,capUsed,capPct};
  }).sort((a,b)=>b.rate-a.rate);

  const best=entries[0];
  lastBest={cardId:best.id,sceneId:curScene,walletKey:curWallet,rate:best.origRate};
  const bc=CARDS.find(c=>c.id===best.id);
  const diff=(best.saving-(entries[entries.length-1].saving)).toFixed(1);

  // Banner
  const banner=document.getElementById("scene-banner");
  banner.style.cssText=`background:${bc.color}18;border:1px solid ${bc.color}33;border-radius:var(--r-xl);padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:13px;`;
  banner.innerHTML=`
    <span class="scene-icon">${sc.icon}</span>
    <div><div class="banner-main">${sc.label}</div><div class="banner-sub">${sc.sub}</div></div>
    <div class="banner-saving">
      <div class="saving-label">最高省下</div>
      <div class="saving-num" style="color:${bc.light}">+$${diff}</div>
    </div>`;

  // Results
  const rl=document.getElementById("results");rl.innerHTML="";
  entries.forEach((e,i)=>{
    const c=CARDS.find(x=>x.id===e.id);
    const isBest=i===0;
    const isJpPx=curWallet==="pxpay"&&curScene==="japan";
    let capHtml="";
    if(e.cap!=null){
      const barColor=e.capPct>=1?"var(--red)":e.capPct>=.8?"var(--amber)":"var(--green)";
      const warnHtml=e.capPct>=1?
        `<div class="cap-warn full">⛔ 本月上限已達，回饋率已降低</div>`:
        e.capPct>=.8?
        `<div class="cap-warn warning">⚠️ 本月快到上限了！剩餘 NT$${(e.cap-e.capUsed).toFixed(0)}</div>`:"";
      capHtml=`<div class="cap-wrap">
        <div class="cap-text"><span>月上限 NT$${e.cap}</span><span>${Math.round(e.capPct*100)}% 已用</span></div>
        <div class="cap-bar-bg"><div class="cap-bar-fill" style="width:${Math.round(e.capPct*100)}%;background:${barColor}"></div></div>
        ${warnHtml}</div>`;
    }
    const div=document.createElement("div");
    div.className="rrow"+(isBest?" best":"");
    div.style.cssText=isBest?
      `background:${c.color}18;border-color:${c.color}55;border-width:2px;border-style:solid;border-radius:var(--r-xl);`:
      `background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-xl);`;
    div.innerHTML=`
      <div class="avatar" style="background:linear-gradient(135deg,${c.color},${c.light})">${c.bank.slice(0,2)}</div>
      <div class="rrow-body">
        <div class="rrow-name">
          <span>${c.name}</span>
          ${isBest?`<span class="best-tag" style="background:${c.color}">${isJpPx?"🔥最強":"最划算"}</span>`:""}
        </div>
        <div class="rrow-note">${e.note}</div>
        ${capHtml}
      </div>
      <div class="rrow-right">
        <div class="rrow-save" style="color:${isBest?c.light:"var(--text2)"}">${e.rate>0?"$"+e.saving.toFixed(1):"—"}</div>
        <div class="rrow-pct">${(e.rate*100).toFixed(2)}%</div>
      </div>`;
    rl.appendChild(div);
  });

  const tips=entries.filter(e=>e.tip).slice(0,1);
  const tb=document.getElementById("tip");
  if(tips.length){const c=CARDS.find(x=>x.id===tips[0].id);tb.innerHTML=`<div class="tip"><span style="font-size:15px;flex-shrink:0">⚠️</span><div class="tip-text"><span class="tip-name">${c.name}</span>・${tips[0].tip}</div></div>`;}
  else tb.innerHTML="";
  document.getElementById("log-btn").style.display=active.length?"flex":"none";
  if(monthlyOpen)renderMonthly();
}

// ── 記錄 & 追蹤 ─────────────────────────────────────────
function openLogModal(){
  if(!lastBest)return;
  const c=CARDS.find(x=>x.id===lastBest.cardId);
  const sc=SCENES.find(x=>x.id===lastBest.sceneId);
  document.getElementById("modal-sub").textContent=`${c.name}・${sc.label}・${(lastBest.rate*100).toFixed(2)}% 回饋`;
  document.getElementById("modal-amt").value=document.getElementById("amt").value||"";
  document.getElementById("log-modal").style.display="flex";
}
function closeLogModal(){document.getElementById("log-modal").style.display="none";}
function confirmLog(){
  const amt=parseFloat(document.getElementById("modal-amt").value);
  if(!amt||amt<=0){alert("請輸入正確金額");return;}
  const{cardId,sceneId,rate}=lastBest;
  if(!monthlyLog[cardId])monthlyLog[cardId]={};
  if(cardId==="dawho"){
    const bonus={none:0,dawho:.025,plus:.04}[dawhoTier]||0;
    monthlyLog[cardId]._global=(monthlyLog[cardId]._global||0)+amt*bonus;
  } else {
    monthlyLog[cardId][sceneId]=(monthlyLog[cardId][sceneId]||0)+amt*rate;
  }
  saveStorage();closeLogModal();render();
  if(monthlyOpen)renderMonthly();
}

function toggleMonthly(){
  monthlyOpen=!monthlyOpen;
  const g=document.getElementById("monthly-grid");
  g.style.display=monthlyOpen?"flex":"none";
  document.getElementById("mtoggle").textContent=monthlyOpen?"▴ 收起":"▾ 展開";
  if(monthlyOpen)renderMonthly();
}

function renderMonthly(){
  const grid=document.getElementById("monthly-grid");
  const active=CARDS.filter(c=>c.active);
  if(!active.length){grid.innerHTML=`<div class="empty">請至少啟用一張卡片</div>`;return;}
  grid.innerHTML=active.map(c=>{
    const clog=monthlyLog[c.id]||{};
    let rows=[];
    if(c.id==="dawho"){
      const cap=CAPS.dawho._global[dawhoTier]||0;
      const spent=clog._global||0;
      if(cap>0){
        const pct=Math.min(1,spent/cap);
        const barColor=pct>=1?"var(--red)":pct>=.8?"var(--amber)":"var(--green)";
        rows.push(`<div class="mitem"><div class="mitem-row"><span>額外回饋上限（${dawhoTier==="plus"?"Plus":dawhoTier==="dawho"?"大戶":"一般"}）</span><span style="color:${pct>=1?"var(--red)":pct>=.8?"var(--amber)":"var(--text2)"}">${spent.toFixed(0)} / ${cap}</span></div><div class="mitem-bar"><div style="height:100%;border-radius:999px;background:${barColor};width:${Math.round(pct*100)}%"></div></div></div>`);
      } else rows.push(`<div class="mitem" style="color:var(--text3)">一般等級無額外回饋上限</div>`);
    } else {
      const capDefs=CAPS[c.id]||{};
      const sceneKeys=Object.keys(capDefs);
      if(!sceneKeys.length) rows.push(`<div class="mitem" style="color:var(--text3)">此卡無月回饋上限</div>`);
      else sceneKeys.forEach(sid=>{
        const cap=(capDefs[sid]||{}).direct;if(!cap)return;
        const spent=clog[sid]||0;const pct=Math.min(1,spent/cap);
        const barColor=pct>=1?"var(--red)":pct>=.8?"var(--amber)":"var(--green)";
        const sc=SCENES.find(x=>x.id===sid);
        rows.push(`<div class="mitem"><div class="mitem-row"><span>${sc?sc.icon+" "+sc.label:sid}</span><span style="color:${pct>=1?"var(--red)":pct>=.8?"var(--amber)":"var(--text2)"}">${spent.toFixed(0)} / ${cap}</span></div><div class="mitem-bar"><div style="height:100%;border-radius:999px;background:${barColor};width:${Math.round(pct*100)}%"></div></div></div>`);
      });
    }
    const allPct=Object.entries(monthlyLog[c.id]||{}).map(([k,v])=>{
      if(c.id==="dawho")return{pct:Math.min(1,v/(CAPS.dawho._global[dawhoTier]||1))};
      const cap=((CAPS[c.id]||{})[k]||{}).direct;return cap?{pct:Math.min(1,v/cap)}:{pct:0};
    });
    const maxPct=allPct.length?Math.max(...allPct.map(x=>x.pct)):0;
    const badgeClass=maxPct>=1?"full":maxPct>=.8?"warn":"ok";
    const badgeText=maxPct>=1?"⛔ 已達上限":maxPct>=.8?"⚠️ 快到上限":"✓ 正常";
    return `<div class="mrow">
      <div class="mrow-header">
        <div class="mrow-name" style="color:${c.light}">${c.name}</div>
        <div class="mrow-badge ${badgeClass}">${badgeText}</div>
      </div>
      <div class="mrow-items">${rows.join("")}</div>
    </div>`;
  }).join("");
}

function resetMonth(){
  if(!confirm("確定要重置本月所有消費記錄？"))return;
  monthlyLog={};saveStorage();render();if(monthlyOpen)renderMonthly();
}
</script>

<script>
if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='card-advisor-v2';
    self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll([self.location.pathname])));self.skipWaiting();});
    self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});
    self.addEventListener('fetch',e=>{if(e.request.url.includes('nominatim')||e.request.url.includes('fonts.g'))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
